# Real 0xC1 Group 6 frames — XtremeSaveBlue Q11, Session 15
#
# Diagnostics: lifetime peak currents, T4 extremes, motor flux, d/q axis,
# torque compensation. Field mapping cross-validated against community protocol research.
# Two runs ~10 min apart: Run 1 compressor at ~47Hz, Run 2 at ~35Hz.

device: "XtremeSaveBlue Q11"
session: "Session 15"
source: "ac_probe.py UART probe via raspi-midea gateway"
bus: "UART (body[1]=0x21)"
frame_type: "0xC1 Group 6"

frames:
  - name: "run1 — compressor at ~47Hz heating"
    timestamp: "2026-04-10T18:11:46Z"
    body_hex: "c1 21 01 46 34 b1 1e 00 10 16 ff 03 02 00 02 00 00 00 00 00 00"
    ground_truth:
      lifetime_max_current: 52     # body[4] = 0x34
      lifetime_max_t4_raw: 177     # body[5] = 0xB1
      lifetime_min_t4_raw: 30      # body[6] = 0x1E
      total_error_count: 0         # body[7] = 0x00
      compressor_flux: 16          # body[8] = 0x10 (raw; consumer multiplies by 8 → 128)
      fan_flux: 22                 # body[9] = 0x16 (raw; ×8 → 176)
      d_axis_current: 255          # body[10] = 0xFF (raw; ×64 → 16320)
      q_axis_current: 3            # body[11] = 0x03 (raw; ×64 → 192)
      compressor_peak_current: 2   # body[12] = 0x02
      pfc_peak_current: 0          # body[13] = 0x00
      fan_peak_current: 2          # body[14] = 0x02
      torque_compensation_angle: 0 # body[15..16] = 00 00 (LE16 = 0)
      torque_compensation_value: 0 # body[17] = 0x00 (raw; ×8 → 0)
      ad_calibration_voltage: 0    # body[18] = 0x00 (raw; ×16 → 0)
    notes: "Compressor running ~47Hz. d_axis=0xFF (signed? or saturated). Raw values — consumer applies ×8/×64/×16 scaling."

  - name: "run2 — compressor at ~35Hz heating (10 min later)"
    timestamp: "2026-04-10T18:21:56Z"
    body_hex: "c1 21 01 46 34 b1 1e 00 10 17 ff 03 02 00 01 00 00 00 00 00 00"
    ground_truth:
      lifetime_max_current: 52
      lifetime_max_t4_raw: 177
      lifetime_min_t4_raw: 30
      total_error_count: 0
      compressor_flux: 16
      fan_flux: 23                 # body[9] = 0x17 (was 0x16)
      d_axis_current: 255
      q_axis_current: 3
      compressor_peak_current: 2
      pfc_peak_current: 0
      fan_peak_current: 1          # body[14] = 0x01 (dropped from 2)
      torque_compensation_angle: 0
      torque_compensation_value: 0
      ad_calibration_voltage: 0
    notes: "10 min later, compressor slowed to ~35Hz. fan_flux raw 0x17 vs 0x16. fan_peak dropped."
