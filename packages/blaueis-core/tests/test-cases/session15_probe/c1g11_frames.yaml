    ground_truth:
      vane_ud_status: 0          # body[4] bits[1:0]
      vane_lr_status: 0          # body[4] bits[3:2]
      vane_top_status: 0         # body[4] bits[5:4]
      vane_ud_cool_upper: 100    # body[5]
      vane_ud_cool_lower: 0      # body[6]
      vane_ud_heat_upper: 100    # body[7]
      vane_ud_heat_lower: 0      # body[8]
      vane_ud_angle: 48          # body[9]
      vane_lr_upper: 100         # body[10]
      vane_lr_lower: 0           # body[11]
      vane_lr_angle: 240         # body[12]
