# Process frame unit tests — targeted checks on individual operations
#
# Each test starts with a fresh status. Tests B5 upgrades, capability
# gating, phase transitions, and frame processing in isolation.

tests:
  # ── B5 capability upgrades ──────────────────────────────────────
  - name: "B5 upgrades eco_mode from capability to always"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    check_field: eco_mode
    assert:
      feature_available: "always"

  - name: "B5 sets fan_speed stepless constraints"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    check_field: fan_speed
    assert:
      feature_available: "always"
      active_constraints.valid_range: [0, 102]
      active_constraints.step: 1
      active_constraints.correction: "clamp"

  - name: "B5 sets target_temperature per-mode ranges"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    check_field: target_temperature
    assert:
      feature_available: "always"
      active_constraints.by_mode.cool.valid_range: [16.0, 30.0]
      active_constraints.by_mode.heat.valid_range: [16.0, 30.0]

  # ── Capability gating ──────────────────────────────────────────
  - name: "buzzer becomes never (cap 0x2C not in B5)"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    check_field: buzzer
    assert:
      feature_available: "never"
      active_constraints: null

  - name: "total_power_kwh becomes never (cap 0x16=0 -> none)"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    check_field: total_power_kwh
    assert:
      feature_available: "never"

  # ── Phase transitions ──────────────────────────────────────────
  - name: "B5 sets phase to post_b5"
    action: b5
    source: "../xtremesaveblue_s1/b5_frames.yaml"
    assert_meta:
      phase: "post_b5"
      b5_received: true

  - name: "C0 without prior B5 stays boot phase"
    action: frame_no_b5
    source: "../xtremesaveblue_s11_frames/c0_frames.yaml"
    index: 0
    assert_meta:
      phase: "boot"
      b5_received: false

  # ── Value decoding ─────────────────────────────────────────────
  - name: "C0 decodes indoor_temperature correctly"
    action: b5_then_frame
    b5_source: "../xtremesaveblue_s1/b5_frames.yaml"
    source: "../xtremesaveblue_s11_frames/c0_frames.yaml"
    index: 0
    check_field: indoor_temperature
    assert:
      # 24.0 integer (body[11]=0x62) + 0.2 tenths (body[15] low nibble = 2)
      value: 24.2
      source: "rsp_0xc0"

  - name: "C0 decodes operating_mode correctly"
    action: b5_then_frame
    b5_source: "../xtremesaveblue_s1/b5_frames.yaml"
    source: "../xtremesaveblue_s11_frames/c0_frames.yaml"
    index: 0
    check_field: operating_mode
    assert:
      value: 4

  # ── Synthetic: cool-only device ────────────────────────────────
  - name: "Cool-only device restricts operating_mode valid_set"
    action: b5
    source: "../synthetic_cool_only/b5_frames.yaml"
    check_field: operating_mode
    assert:
      active_constraints.valid_set: [1, 2, 3, 5]
      active_constraints.correction: "reject"

