    clean_fan_time:
      description: 'Post-run fan / cool fan: keeps fan running after compressor stops to dry evaporator.'
      field_class: sensor
      feature_available: readable
      data_type: bool
      device_context: indoor_unit
      alt_names:
        midea_lua: coolFan
        handbook: Fan Dry, Cool Fan, Post-run Fan
      protocols:
        rsp_0xc0:
          frame: 0xC0 Response
          byte: body[10] bit 7
          decode:
          - offset: 10
            bits:
            - 7
            - 7
          direction: response
          section: §4.1
      confidence: hypothesis
      sources:
      - serial_protocol.md §4.1
    compensated_setpoint:
      description: Compensated temperature setpoint (Tsc) — the internal control
        loop target after adjustments. Encoding (raw - 30) / 2 °C, shared with
        t1_indoor_coil.
      field_class: sensor
      feature_available: readable
      data_type: uint8
      device_context: indoor_unit
      unit: °C
      alt_names:
        midea_lua: compensated_temp_setpoint
      ha:
        device_class: temperature
        state_class: measurement
        unit_of_measurement: °C
        suggested_display_precision: 1
      protocols:
        rsp_0xc1_group5:
          frame: 0xC1 Group 5
          byte: body[5]
          decode:
          - offset: 5
            bits:
            - 7
            - 0
            encoding: temp_offset30_half
          direction: response
          section: §4.2.5
      note: 'Observations consistent with (raw-30)/2: S8 raw=93 → 31.5 °C
        (active heating boost); S1 raw=74-82 → 22-26 °C (varying load); live
        raw=75 → 22.5 °C (steady-state, slightly above user target 21 °C).'
      confidence: consistent
    compressor_idle:
      description: Compressor idle flag. 1 = idle, 0 = running. OEM app mislabels this as compressor current (压缩机电流).
      field_class: binary_sensor
      feature_available: readable
      data_type: bool
      device_context: outdoor_unit
      alt_names:
        midea_lua: compressor_current
        midea_js: yaSuoJiDianLiu
      ha:
        device_class: running
        entity_category: diagnostic
      protocols:
        rsp_0xc1_group1:
          frame: 0xC1 Group 1
          byte: body[6]
          decode:
          - offset: 6
            bits:
            - 0
            - 0
          direction: response
          section: §4.2.1
      note: 'OEM weex.js labels body[6] as 压缩机电流 (compressor current) but live
        data shows 0/1 binary: Atelier Midea Q14 reads 1=idle 0=running;
        XtremeSaveBlue Q11 reads 0 always. Not current — no community impl
        ever decoded this field independently.'
      confidence: confirmed
    compressor_frequency:
      description: Compressor running frequency (FR). 0 Hz when compressor is off.
      field_class: sensor
      feature_available: readable
      data_type: uint8
      device_context: outdoor_unit
      unit: Hz
      alt_names:
        midea_lua: FR
        handbook: Compressor Frequency
      protocols:
        rsp_0xc1_group1:
          frame: 0xC1 Group 1
          byte: body[4]
          decode:
          - offset: 4
            bits:
            - 7
            - 0
          direction: response
          section: §4.2.1
      note: 'Confirmed S11: service menu FR=26 matches raw=0x1A at t=103s. Turbo: ramps 26->80 Hz chasing FT=90.'
      confidence: confirmed
      sources:
      - Session 11 service menu
    compressor_runtime_current:
      description: 'Current compressor run time since last start. Encoding: raw x 64 = seconds.'
      field_class: sensor
      feature_available: readable
      data_type: uint8
      device_context: outdoor_unit
      unit: seconds (raw x 64)
      ha:
        device_class: duration
        state_class: measurement
        unit_of_measurement: min
      alt_names:
