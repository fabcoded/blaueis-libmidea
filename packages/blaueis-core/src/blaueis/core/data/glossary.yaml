    power_off_time_value:
      description: 'Power-off countdown timer value in minutes (0-1440). Derived composite: synthesised from three sub-fields
        packed into body[5] and body[6]. Only meaningful when power_off_timer is ON; value is undefined when the timer switch
        is OFF.'
      field_class: complex_function
      _migration:
        _inferred_class: complex_function
        _inferred_reason: Pure derived field with no wire position of its own — user-visible value is synthesised from close_hour,
          close_step_minutes, and close_min_raw via a multi-input formula. Worked example in serial_glossary_guide.md Part
          3.
      feature_available: readable
      data_type: uint16
      device_context: indoor_unit
      unit: minute
      range:
      - 0
      - 1440
      alt_names:
        midea_lua: closeTime
        msmart: power_off_timer_value
      composite:
        members:
          close_hour:
            data_type: uint8
            range:
            - 0
            - 23
            wire:
              byte_position: bodyBytes[5]
              bit_range:
              - 6
              - 2
          close_step_minutes:
            data_type: uint8
            range:
            - 0
            - 3
            wire:
              byte_position: bodyBytes[5]
              bit_range:
              - 1
              - 0
          close_min_raw:
            data_type: uint8
            range:
            - 0
            - 15
            wire:
              byte_position: bodyBytes[6]
              bit_range:
              - 3
              - 0
      derived_from:
        formula: close_hour * 60 + close_step_minutes * 15 + (15 - close_min_raw)
        inputs:
        - close_hour
        - close_step_minutes
        - close_min_raw
      decompose_to:
      - target: close_hour
        formula: floor(value / 60)
      - target: close_step_minutes
        formula: floor((value % 60) / 15)
      - target: close_min_raw
        formula: 15 - ((value % 60) % 15)
      shares_byte_with:
        bodyBytes[5]:
        - power_off_timer
        bodyBytes[6]:
        - power_on_time_value
        note: 'bodyBytes[5] bit 7 is owned by power_off_timer (switch). Bits 6:0 carry this field''s close_hour and close_step_minutes
          sub-fields. bodyBytes[6] is shared: upper nibble belongs to power_on_time_value (open_min_raw), lower nibble to
          this field (close_min_raw). The encoder must read all siblings before writing either byte.'
      protocols:
        rsp_0xc0:
          frame: 0xC0 Response
          byte: 'derived: body[5] bits[6:0] + body[6] bits[3:0]'
          direction: response
          section: §4.1
        cmd_0x40:
          frame: 0x40 Set
          byte: 'derived: body[5] bits[6:0] + body[6] bits[3:0]'
          direction: command
          section: §3.2
      constraints:
        global:
        - requires: power_off_timer == true
          correction: reject
          note: Timer value is only meaningful when the timer switch is enabled.
      note: 'Wire encoding uses an inverted minute remainder: the raw nibble in body[6] bits[3:0] stores (15 - minutes), so
        raw 0x0F = 0 minutes and raw 0x00 = 15 minutes. When the timer is OFF, body[5] = 0x7F and body[6] lower nibble = 0x00
        (meaningless).'
      confidence: consistent
      sources:
      - 'Session 11 (timer OFF verified: body[5]=0x7F, body[6]=0x00)'
    power_off_timer:
      description: Power-off timer enable/disable switch. When ON, the unit will automatically power off after the countdown
        set by power_off_time_value.
      field_class: stateful_bool
      _migration:
        _inferred_class: stateful_bool
        _inferred_reason: Boolean switch gating the power_off_time_value derived field. Owns bit 7 of body[5]; remaining bits
          belong to the time value's sub-fields.
      feature_available: readable
      data_type: bool
      device_context: indoor_unit
      alt_names:
        midea_lua: closeTimerSwitch
        msmart: power_off_timer
        dudanov: timerOff
      protocols:
        cmd_0x40:
          frame: 0x40 Set
          byte: body[5] bit 7
          decode:
          - offset: 5
            bits:
            - 7
            - 7
          direction: command
          section: §3.2
        rsp_0xc0:
          frame: 0xC0 Response
          byte: body[5] bit 7
          decode:
          - offset: 5
            bits:
            - 7
            - 7
          direction: response
          section: §4.1
      shares_byte_with:
        bodyBytes[5]:
        - power_off_time_value
        note: When the encoder writes bodyBytes[5], it must also pack close_hour (bits 6:2) and close_step_minutes (bits 1:0)
          from power_off_time_value, or those sub-fields get clobbered. When timer is OFF, the manufacturer Lua writes 0x7F
          to the entire byte (all sub-field bits set as don't-care).
      note: The manufacturer Lua uses constants BYTE_CLOSE_TIMER_SWITCH_ON = 0x80 and BYTE_CLOSE_TIMER_SWITCH_OFF = 0x7F.
