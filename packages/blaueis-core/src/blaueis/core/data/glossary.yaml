    jet_cool:
      description: Jet Cool mode. Rapid cooling burst, typically full power for a fixed duration.
      field_class: stateful_bool
      feature_available: capability
      data_type: bool
      device_context: indoor_unit
      alt_names:
        midea_app: jetCool
      ux:
        visible_in_modes: [cool]
        sources: community protocol research
      mutual_exclusion:
        when_on:
          forces:
            turbo_mode: 0
            strong_wind: 0
            eco_mode: 0
            swing_vertical: 0
            swing_horizontal: 0
            louver_swing_angle_ud_enum: 0
            louver_swing_angle_lr_enum: 0
            breeze_away: 0
            breeze_mild: 0
            breezeless: 0
            no_wind_sense: 0
            new_wind_sense: 0
          reason: |
            Source-of-truth mutex set, consumed by integration UX-overlay
            (compute "temporary function presence"), NOT by wire enforcement.
            Integration passes user intent to AC unmodified; AC firmware is
            authority. Overlay rule: when jet_cool is on, the listed fields
            are normally hidden / disabled in the UI — UNLESS one of them
            already carries a non-default value (preserved from earlier
            state). In that case the field's button stays available so the
            user can clear it manually. The button hides on next render once
            the field returns to its default value.

            Probe evidence (atelier unit, cool mode):
              swing_v + vane_angle: AC tolerates simultaneously (no enforcement)
              turbo + eco/strong:   AC silently drops turbo (real firmware mutex)
              turbo solo:           never engages on this unit (firmware-disabled)
              breeze family:        not yet probed on this unit

            OEM app also writes rate_select=100 alongside — out of our enum
            domain [0..3], so integration does not mirror that side effect.
            AC handles its own throughput internally.
      protocols:
        cmd_0xb0:
          frame: 0xB0 Property Set
          byte: 'property ID 0x67,0x00; data: 0x00=off, 0x01=on'
          direction: command
          decode:
          - property_id: 0x67,0x00
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
        rsp_0xb1:
          frame: 0xB1 Property Response
          byte: property ID 0x67,0x00; data byte 0
          direction: response
          decode:
          - property_id: 0x67,0x00
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
      capability:
        cap_id: '0x67'
        cap_id_16: '0x0067'
        cap_type: simple
        description: Whether Jet Cool rapid cooling mode is available.
        frames:
          rsp_0xb5_tlv:
            frame: 0xB5 Capability Response (TLV)
            byte: record ID 0x67, type 0x00, data byte[0] != 0
            direction: capability
            section: §3.4.1
        values:
          not_supported:
            raw: 0
            feature_available: never
            description: Jet Cool not available
          supported:
            raw: 1
            feature_available: always
            description: Jet Cool available
        confidence: hypothesis
