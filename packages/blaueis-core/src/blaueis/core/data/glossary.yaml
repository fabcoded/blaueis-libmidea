    cosy_sleep:
      description: 'Comfort sleep mode. Multi-key composite: the user-visible state is determined by the combination of comfortableSleepValue
        (body[8] bits[1:0]) and comfortableSleepSwitch (body[9] bit 6). A third sub-field, comfortableSleepTime (body[17]
        bits[4:0]), carries the sleep duration and is destructively overwritten to 0x0A when transitioning to ON.'
      field_class: complex_function
      _migration:
        _reclassified_from: stateful_enum
        _inferred_reason: 'Upgraded from stateful_enum to complex_function: the field''s ON/OFF state requires coordinating
          three sub-fields across three wire bytes (8, 9, 17), with a state-machine transition that destructively writes the
          sleep timer. The existing sensor cosy_sleep_switch (body[9] bit 6) is now a composite member of this field rather
          than an independent sensor.'
      feature_available: always
      data_type: uint8
      device_context: indoor_unit
      alt_names:
        midea_lua: comfortableSleepValue
        handbook: Comfort Sleep, Cosy Sleep
        dudanov: comfortSleep
      composite:
        members:
          comfortable_sleep_value:
            data_type: uint8
            range:
            - 0
            - 3
            wire:
              byte_position: bodyBytes[8]
              bit_range:
              - 1
              - 0
          comfortable_sleep_switch:
            data_type: uint8
            range:
            - 0
            - 1
            wire:
              byte_position: bodyBytes[9]
              bit_range:
              - 6
              - 6
          comfortable_sleep_time:
            data_type: uint8
            range:
            - 0
            - 31
            wire:
              byte_position: bodyBytes[17]
              bit_range:
              - 4
              - 0
      state_machine:
        states:
          'off':
            signature:
              comfortable_sleep_value: 0
              comfortable_sleep_switch: 0
          'on':
            signature:
              comfortable_sleep_value: 3
              comfortable_sleep_switch: 64
          undefined:
            observable: true
            emittable: false
            description: Any (value, switch) pair other than (0x00, 0x00) or (0x03, 0x40). Flag in dissector output as inconsistent
              device state.
        transitions:
        - from:
          - 'off'
          - undefined
          to: 'on'
          encoder_writes:
            comfortable_sleep_value: 3
            comfortable_sleep_switch: 64
            comfortable_sleep_time: 10
          side_effects:
          - destructive_write:
              target: comfortable_sleep_time
              prior_value_lost: true
              note: 'Setting comfort_sleep=on always rewrites the timer to 0x0A (10). The Lua also generates a temperature
                curve in body[11-15] based on the current mode (heat: -1/-2°C, cool: +1/+2°C).'
        - from:
          - 'on'
          - undefined
          to: 'off'
          encoder_writes:
            comfortable_sleep_value: 0
            comfortable_sleep_switch: 0
      shares_byte_with:
        bodyBytes[8]:
        - strong_wind
        - power_save
        - alarm_sleep
        - energy_save
        - follow_me
        - low_frequency_fan
        bodyBytes[9]:
        - cleanup
        - eco_mode
        - dry_clean
        - ptc_heater
        - child_sleep
        - exchange_air
        bodyBytes[17]:
        - natural_wind
        note: 'Three wire bytes are shared with many siblings. bodyBytes[8] is the most densely packed: all 8 bits are claimed.
          The encoder must read all siblings before writing. The manufacturer Lua uses bit.bor chains to reconstruct each
          byte from the full set of contributing fields.'
      protocols:
        cmd_0x40:
          frame: 0x40 Set
          byte: 'composite: body[8] bits[1:0] + body[9] bit 6 + body[17] bits[4:0]'
          decode:
          - offset: 8
            bits:
            - 1
            - 0
          direction: command
          section: §3.2
        rsp_0xc0:
          frame: 0xC0 Response
          byte: 'composite: body[8] bits[1:0] + body[9] bit 6 + body[17] bits[4:0]'
          decode:
          - offset: 8
            bits:
            - 1
            - 0
          direction: response
          section: §4.1
      disambiguation: 'The manufacturer Lua (Q11) reads comfortableSleepTime with mask 0x15

        (bits 4, 2, 0 — non-contiguous). This is almost certainly a bug:

        the ON transition writes 0x0A (0b00001010), and 0x0A & 0x15 = 0x00,

        which would lose the value entirely. The correct mask should be 0x1F

        (bits[4:0] contiguous), giving 0x0A & 0x1F = 0x0A as expected.

        This glossary uses the corrected mask 0x1F. Confidence: disputed

        (glossary disagrees with manufacturer Lua; corrected mask is logically

        necessary for the ON-transition value to survive the read-back).

        '
      note: The existing sensor field cosy_sleep_switch (body[9] bit 6) is the same wire position as composite member comfortable_sleep_switch.
        That sensor entry remains for backward compatibility but is semantically redundant with this composite.
      confidence: confirmed
      sources:
      - own captures Session 7/11
      - forge-mode cross-validation
