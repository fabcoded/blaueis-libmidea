meta:
  version: 0.1.0
  protocol_focus: serial
  primary_bus:
  - uart
  - rt
  reference_buses:
  - xye
  - mainboard
  - ir
  last_updated: '2026-04-05'
  schema: serial_glossary_schema.json
encodings:
  temp_offset50_half:
    formula: (raw - 50) / 2.0
    unit: °C
    scale: 0.5
    offset: 50
    note: C0 body[11-12] indoor/outdoor, C1 Group 1 body[12-13] T3/T4.
  temp_offset30_half:
    formula: (raw - 30) / 2.0
    unit: °C
    scale: 0.5
    offset: 30
    note: C1 Group 1 body[10] T1 indoor coil. Also mainboard AA20 setpoint.
  temp_setpoint_legacy:
    formula: bits[3:0] + 16 + (0.5 if bit4)
    unit: °C
    scale: 0.5
    offset: -16
    range:
    - 16.0
    - 30.5
    note: 0x40/0xC0 body[2]. Legacy field; body[13]/body[18] override if > 0.
  temp_setpoint_new:
    formula: bits[4:0] + 12
    unit: °C
    scale: 1.0
    offset: -12
    range:
    - 12.0
    - 43.0
    note: 0x40 body[18] / 0xC0 body[13] bits[4:0]. Extended range. Overrides legacy when > 0.
  temp_direct_integer:
    formula: raw
    unit: °C
    scale: 1.0
    offset: 0
    note: C1 Group 1 body[14] discharge pipe. MCU applies NTC lookup internally.
  eev_steps:
    formula: raw * 8
    unit: steps
    scale: 8
    offset: 0
    note: Electronic expansion valve position/target. The wire carries a uint8
      counter that represents the motor step count divided by 8 — multiply back
      to recover the actual step value. Used by eev_position and eev_target_angle.
  temp_follow_me:
    formula: (raw - 50) / 2.0
    unit: °C
    scale: 0.5
    offset: 50
    range:
    - 0.0
    - 50.0
    note: 0x41 optCommand=0x01 body[5]. Same formula as temp_offset50_half.
  temp_fahrenheit:
    formula: °F = °C × 9/5 + 32
    unit: °F
    note: 'Not a wire encoding — Fahrenheit is never stored on the serial bus. All temperature fields are encoded in °C internally.
      Fahrenheit is derived by applying the standard conversion to the decoded Celsius value. The display unit flag (0x40
      body[10] bit 2 / 0xC0 body[10] bit 2, 0=°C 1=°F) controls which unit the UI shows but does not change the wire encoding.
      XYE setpoint (C3 byte[8]) has a native Fahrenheit mode (bit7=1, offset 0x07) but the serial bus does not. This project
      uses SI units (°C) exclusively — see AGENTS.md.

      '
  power_bcd_4:
    formula: bcd(b[0])*10000 + bcd(b[1])*100 + bcd(b[2]) + bcd(b[3])/100
    unit: kWh
    byte_count: 4
    note: 4-byte BCD for cumulative energy. Pseudo-BCD; nibbles >9 treated as hex digits.
  power_bcd_3:
    formula: bcd(b[0]) + bcd(b[1])/100 + bcd(b[2])/10000
    unit: kW
    byte_count: 3
    note: 3-byte BCD for instantaneous power.
  power_linear_4:
    formula: 4-byte big-endian integer / 100.0
    unit: kWh
    byte_count: 4
    note: Non-BCD alternative for energy. Used when cap 0x16 = 4 or 5.
  power_linear_3:
    formula: 3-byte big-endian integer / 10000.0
    unit: kW
    byte_count: 3
    note: Non-BCD alternative for instantaneous power.
  uint16_le:
    formula: body[o] | (body[o+1] << 8)
    unit: ''
    byte_count: 2
    byte_order: le
    note: Generic 16-bit little-endian unsigned integer. Dispatch in apply_encoding via byte_order metadata.
  uint16_be:
    formula: (body[o] << 8) | body[o+1]
    unit: ''
    byte_count: 2
    byte_order: be
    note: Generic 16-bit big-endian unsigned integer.
  uint24_le:
    formula: body[o] | (body[o+1] << 8) | (body[o+2] << 16)
    unit: ''
    byte_count: 3
    byte_order: le
    note: Generic 24-bit little-endian unsigned integer.
  uint24_be:
    formula: (body[o] << 16) | (body[o+1] << 8) | body[o+2]
    unit: ''
    byte_count: 3
    byte_order: be
    note: Generic 24-bit big-endian unsigned integer.
frames:
  cmd_0x41:
    purpose: Standard status query (triggers 0xC0 response)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 129
      - 0
      - 255
      - 3
      - 255
      - 0
      - 2
    triggers:
    - rsp_0xc0
    bus:
    - uart
    - rt
    section: §3.1.1
    confidence: confirmed
    sources:
    - tools-serial/midea_frame.py::build_status_query
    - serial_protocol.md §3.1.1
    note: 'Our code uses body[4..7] = 03 FF 00 02. The OEM WiFi dongle

      (wifiBrown capture source) uses body[4..7] = 00 00 00 00 — see

      Session 8 line 932 and similar. Both patterns yield a 0xC0

      response from the AC, so the trailing bytes appear to be

      "reserved/optional filter flags" rather than required. Our

      code''s bytes are preserved here as the canonical build so the

      existing 269-test suite stays green; the OEM variant is noted

      as an observed alternative.

      '
  cmd_0x41_group0:
    purpose: C1 Group 0 query (power-on time, total/current runtime)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 64
    triggers:
    - rsp_0xc1_group0
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: hypothesis
    sources:
    - own probe 2026-04-10 (UART, AC running, all zeros — AC may not populate timers)
    - community protocol research
    note: 'body[1]=0x21 variant. AC responded with all-zero body on UART

      (probe 2026-04-10). JS app decodes power-on days/hours, total

      worked time, current session time. May need AC to accumulate

      runtime before non-zero values appear.

      '
  cmd_0x41_group1:
    purpose: C1 Group 1 query (compressor freq, temps, run-status)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 65
    triggers:
    - rsp_0xc1_group1
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: confirmed
    sources:
    - own captures Sessions 1/3/11 (91+ R/T instances with body[1]=0x81)
    - own probe 2026-04-10 (UART with body[1]=0x21 — full data returned)
    note: 'Works on both buses. Prior captures only used body[1]=0x81 which

      is rejected on UART. body[1]=0x21 confirmed working on UART

      (probe 2026-04-10: FR=47Hz, T1=24°C, T3=6.5°C, T4=9.5°C).

      '
  cmd_0x41_group2:
    purpose: C1 Group 2 query (indoor unit faults, freq-limit, load states)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 66
    triggers:
    - rsp_0xc1_group2
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: confirmed
    sources:
    - own probe 2026-04-10 (UART, AC running — fan speeds, load state bits)
    - community protocol research
    note: 'body[1]=0x21 variant. Probe returned indoor fan set/actual RPM,

      fault state bits, freq-limit bits, load state bits.

      '
  cmd_0x41_group3:
    purpose: C1 Group 3 query (outdoor unit state, fan, EEV, temps)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 67
    triggers:
    - rsp_0xc1_group3
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: confirmed
    sources:
    - own captures Sessions 1/3 (R/T with body[1]=0x81)
    - own probe 2026-04-10 (UART with body[1]=0x21 — full data returned)
    note: 'Works on both buses. body[1]=0x21 confirmed on UART (probe

      2026-04-10: outdoor fan 776RPM, EEV 496 steps, DC bus 175V).

      '
  cmd_0x41_group4_power:
    purpose: C1 Group 4 — energy usage query (kWh, instantaneous power)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 68
    triggers:
    - rsp_0xc1_group4
    bus:
    - uart
    - rt
    section: §3.1.3
    confidence: confirmed
    sources:
    - own captures Sessions 1/8/12 (wifiBrown, many instances)
    - own probe 2026-04-10 (UART — 721.27 kWh total, 660W real-time)
    - community protocol research
    note: 'body[1]=0x21 variant. All group queries use 0x21 on UART;

      0x81 is rejected on UART for group pages. Encoding depends

      on B5 cap 0x16: linear (cap=0/4/5) or BCD (cap=2/3).

      '
  cmd_0x41_group5:
    purpose: C1 Group 5 query (extended energy/runtime telemetry)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 69
    triggers:
    - rsp_0xc1_group5
    bus:
    - uart
    - rt
    section: §3.1.3
    confidence: confirmed
    sources:
    - own captures Sessions 1/8/10/11/12 (wifiBrown, many instances)
    - own probe 2026-04-10 (UART — fan runtime, EEV target, bus voltages)
    note: 'body[1]=0x21 variant. Probe confirmed: humidity, compensated

      setpoint, indoor fan runtime, EEV target angle, compressor

      cumulative hours, max/min bus voltage.

      '
  cmd_0x41_group6:
    purpose: C1 Group 6 query (diagnostics — peak currents, flux, T4 extremes)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 70
    triggers:
    - rsp_0xc1_group6
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: confirmed
    sources:
    - own probe 2026-04-10 (UART — maxCurrent, T4 extremes, flux values)
    - community protocol research
    note: 'body[1]=0x21 variant. Diagnostic counters: max current, max/min

      T4, total error count, compressor/fan flux, d/q axis current,

      peak currents (compressor/PFC/fan), torque compensation, AD cal.

      '
  cmd_0x41_group7:
    purpose: C1 Group 7 query (undocumented — no app decoder)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 71
    triggers:
    - rsp_0xc1_group7
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: hypothesis
    sources:
    - own probe 2026-04-10 (UART — non-zero data, no known decoder)
    note: 'body[1]=0x21 variant. AC returns data but no community source

      decodes group 7. Probe standby: [5]=0xFE [6]=0x03 [10]=0x01.

      Probe running: [5]=0xFD [6]=0x07 [7]=0x01 [8]=0x06 [10]=0x8F

      [11]=0x02. Fields change with compressor state.

      '
  cmd_0x41_group11:
    purpose: C1 Group 11 query (vane strip status, limits, angles)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 75
    triggers:
    - rsp_0xc1_group11
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: confirmed
    sources:
    - own probe 2026-04-10 (UART — vane angles and limits returned)
    - community protocol research
    note: 'body[1]=0x21 variant. Previously only tried with 0x81 (rejected

      on UART). Probe returned UD/LR vane limits and current angles.

      '
  cmd_0x41_group12:
    purpose: C1 Group 12 query (undocumented — no app decoder)
    msg_type: 3
    body:
      length: 24
      bytes:
      - 65
      - 33
      - 1
      - 76
    triggers:
    - rsp_0xc1_group12
    bus:
    - uart
    - rt
    section: §3.1.2
    confidence: hypothesis
    sources:
    - own probe 2026-04-10 (UART — body[4]=0x02, body[6]=0x0F)
    note: 'body[1]=0x21 variant. AC returns sparse data, no known decoder.

      Undocumented group page.

      '
  cmd_0x41_ext:
    purpose: Extended state query (sub-page 0x02) — defrost, dehumidify, etc.
    msg_type: 3
    body:
      length: 24
      bytes_at:
        '0': 65
        '1': 129
        '4': 3
        '7': 2
    triggers:
    - rsp_0xc1_sub02
    bus:
    - uart
    - rt
    section: §3.1.4
    confidence: hypothesis
    sources:
    - serial_protocol.md §3.1.4 documentation
    - TODO_glossary.md §6 design sketch
    note: 'Not currently built by any function in tools-serial/. Not

      observed in captures either — the OEM dongle and extension

      board we have don''t issue this query, but the AC''s response

      (rsp_0xc1_sub02) is referenced by three fields in the

      glossary so some source sends it. Body form uses bytes_at

      to document the selector bytes (optCommand=0x03 at body[4],

      queryStat=0x02 at body[7]).

      '
  cmd_0xb5_extended:
    purpose: Extended capability TLV query (type 0x02, page 0x00)
    msg_type: 3
    body:
      length: 3
      bytes:
      - 181
      - 1
      - 0
    triggers:
    - rsp_0xb5_tlv
    - rsp_0xb5_fixed
    bus:
    - uart
    - rt
    section: §3.4.1
    confidence: confirmed
    sources:
    - own captures Sessions 1-11 (wifiBrown + bidirectionalExtensionBoard)
    - tools-serial/midea_frame.py::build_cap_query_extended
    note: 'Returns extended-type (0x02) capability records: encoding-rich

      features like fan modes, operating modes, target temperature

      ranges, power calc.

      '
  cmd_0xb5_simple:
    purpose: Simple capability TLV query (type 0x00, page 0x01 + 0x21)
    msg_type: 3
    body:
      length: 5
      bytes:
      - 181
      - 1
      - 1
      - 1
      - 33
    triggers:
    - rsp_0xb5_tlv
    bus:
    - uart
    - rt
    section: §3.4.1
    confidence: confirmed
    sources:
    - own captures Sessions 1-11
    - tools-serial/midea_frame.py::build_cap_query_simple
    note: 'Returns simple-type (0x00) capability records: boolean features

      like swing axes, frost protection, anion ionizer, breeze,

      self-clean, ptc heater.

      '
  cmd_0x40:
    purpose: Set state command — body assembled from per-field cmd_0x40 decode arrays
    msg_type: 2
    body:
      length: 26
      assembled_from: cmd_0x40
    bus:
    - uart
    - rt
    section: §3.2
    confidence: confirmed
    sources:
    - tools-serial/build_command.py::build_command_body
    note: 'Variable-content body assembled at call time by walking every

      field whose protocols.cmd_0x40.decode is populated. body[0]

      is always 0x41. Unlike the query frames above, this frame

      has no fixed bytes beyond the command byte — every bit

      position is owned by a field.

      '
  cmd_0xb0:
    purpose: Property set/get — body assembled from per-field cmd_0xb0 protocol entries
    msg_type: 2
    body:
      assembled_from: cmd_0xb0
    triggers:
    - rsp_0xb1
    - rsp_0xb1_prop
    bus:
    - uart
    - rt
    section: §3.5
    confidence: hypothesis
    sources:
    - TODO_glossary.md §6 design sketch
    note: 'Length varies per property write. No current Python builder —

      the codec constructs 0xB0 frames on demand for anion_ionizer,

      breezeless, buzzer''s persistent alternative, and similar

      property-only fields. Reads of property values come back via

      rsp_0xb1 (simple data) or rsp_0xb1_prop (extended data, e.g.

      target_temperature range values via cap 0x25).

      '
protocol_generations:
  cmd_0x40: legacy
  cmd_0x41_display: legacy
  cmd_0xb0: new
  rsp_0xb0: new
  rsp_0xb1: legacy
  rsp_0xb5: new
  rsp_0xc0: legacy
  rsp_0xc1_group0: legacy
  rsp_0xc1_group1: legacy
  rsp_0xc1_group2: legacy
  rsp_0xc1_group3: legacy
  rsp_0xc1_group4: legacy
  rsp_0xc1_group5: legacy
  rsp_0xc1_group6: legacy
  rsp_0xc1_group7: legacy
  rsp_0xc1_group11: legacy
  rsp_0xc1_group12: legacy
  rsp_0xc1_sub02: legacy
  rsp_0xa1: null
fields:
  control:
    alarm_sleep:
      description: Alarm sleep / wake-up timer function.
      field_class: stateful_bool
      _migration:
        _previous_feature_available: always
        _inferred_reason: '§10 default-deny audit: hypothesis confidence, decode-only evidence (false in S7/S11 ground truth),
          no active state-change capture, no independent source confirmation. Demoted until round-trip verified.'
        _source: §10 audit 2026-04-10
      feature_available: readable
      data_type: bool
      device_context: indoor_unit
      alt_names:
        midea_lua: alarmSleep
        handbook: Alarm Sleep
      protocols:
        cmd_0x40:
          frame: 0x40 Set
          byte: body[8] bit 2
          decode:
          - offset: 8
            bits:
            - 2
            - 2
          direction: command
          section: §3.2
        rsp_0xc0:
          frame: 0xC0 Response
          byte: body[8] bit 2
          decode:
          - offset: 8
            bits:
            - 2
            - 2
          direction: response
          section: §4.1
      confidence: hypothesis
      sources:
      - serial_protocol.md §3.2/§4.1
    anion_ionizer:
      description: Anion / negative-ion air purifier. Generates negative ions to improve air quality.
      field_class: stateful_bool
      feature_available: capability
      data_type: bool
      device_context: indoor_unit
      alt_names:
        midea_lua: b5_anion
      protocols:
        cmd_0xb0:
          frame: 0xB0 Property Set
          byte: 'property ID 0x1E,0x02; data: 0x00=off, 0x01=on'
          direction: command
          decode:
          - property_id: 0x1E,0x02
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
        rsp_0xb1:
          frame: 0xB1 Property Response
          byte: property ID 0x1E,0x02; data byte
          direction: response
          decode:
          - property_id: 0x1E,0x02
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
      capability:
        cap_id: '0x1E'
        cap_id_16: '0x021E'
        cap_type: extended
        description: Whether the unit has an anion/ionizer purifier.
        frames:
          rsp_0xb5_tlv:
            frame: 0xB5 Capability Response (TLV)
            byte: record ID 0x1E, type 0x02, data byte[0]
            direction: capability
            section: §3.4.1
        values:
          not_supported:
            raw: 0
            feature_available: never
            description: Ionizer not available
            correction: ignore
          supported:
            raw: 1
            feature_available: always
            description: Ionizer available (protocol-level)
        confidence: consistent
      disambiguation: 'XtremeSaveBlue Q11 reports cap 0x1E=1 but neither app nor remote

        show an ionizer button. The B5 capability alone is insufficient to

        determine feature availability — additional UI-layer gating may

        apply (device model check, plugin version, or serial number routing).

        Property-only control (0x1E,0x02), no 0x40/0xC0 body bits.

        '
      confidence: hypothesis
      sources:
      - Session 1 B5 query (0x1E=1, but no UI)
    breeze_away:
      description: 'Breeze Away: deflects airflow away from the user. Handbook §1.18 (non-TwinFlap) or sub-mode of Breezeless
        function (TwinFlap).'
      field_class: stateful_bool
      _migration:
        _reclassified_from: complex_function
        _inferred_reason: bool toggle with read/write symmetry; prior complex_function flag was a field-extractor block-extractor
          false positive (shared encode cascade). Modal behaviour on YB100/FA100 is orchestrated elsewhere and does not change
          this field's wire semantics.
      feature_available: capability
      data_type: bool
      device_context: indoor_unit
      ux:
        visible_in_modes: [cool, heat, fan_only, dry, auto]
        sources: community protocol research
      mutual_exclusion:
        when_on:
          forces:
            breeze_mild: 0
            breezeless: 0
            turbo_mode: 0
            jet_cool: 0
            swing_vertical: 0
            louver_swing_angle_ud_enum: 0
          reason: |
            TwinFlap breeze family. On FA100 units the three breeze modes
            (breeze_away, breeze_mild, breezeless) share property 0x43 as a
            state machine and are mutually exclusive by construction.
            Non-FA100 units expose them as independent bools but the same
            logic applies — concurrent deflection geometries fight. Also
            suppresses swing/turbo/jet_cool which reshape the micro-vent path.
      alt_names:
        midea_lua: wind_avoid
        dudanov: WIND_OFF_ME
        handbook: Breeze Away
      protocols:
        cmd_0xb0:
          frame: 0xB0 Property Set
          byte: 'property ID 0x33,0x00; data: 0x01=on, 0x00=off'
          direction: command
          decode:
          - property_id: 0x33,0x00
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
        rsp_0xb1:
          frame: 0xB1 Property Response
          byte: property ID 0x33,0x00; data byte 0
          direction: response
          decode:
          - property_id: 0x33,0x00
            offset: 0
            bits:
            - 0
            - 0
          section: §3.5
      capability:
        cap_id: '0x33'
        cap_id_16: '0x0033'
        cap_type: simple
        description: 'Whether Breeze Away is available. INVERTED LOGIC: val=0 means supported.'
        frames:
          rsp_0xb5_tlv:
            frame: 0xB5 Capability Response (TLV)
            byte: record ID 0x33, type 0x00, data byte[0]
            direction: capability
            section: §3.4.1
        values:
          supported:
            raw: 0
            description: 'Breeze Away available (inverted: 0=yes)'
            feature_available: always
          not_supported:
            raw: 1
            description: 'Not available (inverted: non-zero=no)'
            correction: ignore
            feature_available: never
        alt_names:
          dudanov: CAPABILITY_WIND_OF_ME
        note: 'INVERTED LOGIC per node-mideahvac: val=0 means supported.'
        confidence: consistent
        sources:
        - dudanov
        - node-mideahvac (inverted)
      note: Property-only (no 0x40/0xC0 body bits). On YB100 models, routed internally to property 0x32 with value 0x02. On
        FA100/TwinFlap, part of fa_no_wind_sense state machine (value 2).
      confidence: hypothesis
      sources:
      - handbook §1.18
    breeze_mild:
      description: 'Breeze Mild: intermediate soft-breeze mode between Breeze Away and Breezeless. TwinFlap models only.'
      field_class: stateful_bool
      _migration:
        _reclassified_from: complex_function
        _inferred_reason: bool toggle with read/write symmetry; prior complex_function flag was a field-extractor block-extractor
          false positive (shared encode cascade with sibling breeze fields).
      feature_available: capability
      data_type: bool
      device_context: indoor_unit
      ux:
        visible_in_modes: [cool, heat, fan_only, dry, auto]
        sources: community protocol research
      mutual_exclusion:
        when_on:
          forces:
            breeze_away: 0
            breezeless: 0
            turbo_mode: 0
            strong_wind: 0
            jet_cool: 0
            swing_vertical: 0
            louver_swing_angle_ud_enum: 0
          reason: |
            TwinFlap breeze family member (see breeze_away for family rules).
            Intermediate soft-breeze geometry. Concurrent breeze modes,
            swing, turbo, or jet_cool reshape the micro-vent path and fight
            this field's geometry. Also forces strong_wind off and auto-fan
            per community protocol research on FA100 behavior.
      alt_names:
        midea_lua: gentle_wind_sense
        dudanov: BREEZE_CONTROL
        handbook: Breeze Mild
      protocols:
        cmd_0xb0:
          frame: 0xB0 Property Set
