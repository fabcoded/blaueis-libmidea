    target_temperature:
      description: User-requested room temperature setpoint.
      field_class: stateful_numeric
      _migration:
        _reclassified_from: complex_function
        _inferred_reason: 'continuous numeric setpoint in [16.0, 30.5] °C with 0.5 step via half_bit; the field-extractor
          flagged this as complex because the block-extractor grabbed sibling keys (smallTemperature, temperature_unit) from
          shared encode bridges. In fact the field is a single numeric value: the half-degree flag is handled by the existing
          half_bit decode-chain syntax, the dual encoding (body[2] legacy vs body[13] extended) by condition-based decode
          steps, and the per-mode valid ranges come from capability cap_id 0x25 which is already fully declared. No composite/derived_from/decompose_to
          needed.'
        _source: manual review during option-2 pass of conservative migration
      feature_available: readable
      data_type: float
      device_context: indoor_unit
      unit: °C
      range:
      - 16.0
      - 30.5
      alt_names:
        midea_lua: temperature
        dudanov: targetTemp
        msmart: target_temperature
        node_mideahvac: setpoint
        midea_local: target_temperature
        midea_ac_lan: target_temperature
      protocols:
        cmd_0x40:
          frame: 0x40 Set
          byte: body[2] bits[3:0] + bit4 half-flag
          encoding: temp_setpoint_legacy
          direction: command
          decode:
          - offset: 2
            bits:
            - 3
            - 0
            add: 16
            half_bit:
              offset: 2
              bit: 4
          section: §3.2
        rsp_0xc0:
          frame: 0xC0 Response
          byte: body[2] bits[3:0] + bit4; body[13] bits[4:0] overrides if > 0
          decode:
          - offset: 13
            bits:
            - 4
            - 0
            add: 12
            condition: '!= 0'
          - offset: 2
            bits:
            - 3
            - 0
            add: 16
            half_bit:
              offset: 2
              bit: 4
          direction: response
          section: §4.1
      capability:
        cap_id: '0x25'
        cap_id_16: '0x0225'
        cap_type: extended
        description: Temperature ranges per mode. Data bytes carry the actual min/max values.
        frames:
          rsp_0xb5_tlv:
            frame: 0xB5 Capability Response (TLV)
            byte: record ID 0x25, type 0x02, data bytes[0-5] (or [0-6])
            direction: capability
            section: §3.4.1
          rsp_0xb1_prop:
            frame: 0xB1 Property Response
            byte: property ID 0x25,0x02; 7 data bytes
            direction: capability
            section: §3.5
        default:
          description: 'Pre-B5: 17-30°C with 1°C steps for all modes'
          by_mode:
            cool:
              valid_range:
              - 17
              - 30
              step: 1.0
              correction: clamp
            heat:
              valid_range:
              - 17
              - 30
              step: 1.0
              correction: clamp
            auto:
              valid_range:
              - 17
              - 30
              step: 1.0
              correction: clamp
            dry:
              valid_range:
              - 17
              - 30
              step: 1.0
              correction: clamp
            fan:
              valid_range:
              - 17
              - 30
              step: 1.0
              correction: clamp
          note: 'Permissive default applied at boot — 17-30°C in 1°C steps.

            Replaced once cap 0x25 arrives carrying per-mode min/max

            bytes (then half-degree may be enabled by the half_deg flag

            in cap data byte 6).

            '
        decode:
          cool_min:
            offset: 0
            formula: raw * 0.5
            unit: °C
            mode: cool
            role: min
          cool_max:
            offset: 1
            formula: raw * 0.5
            unit: °C
            mode: cool
            role: max
          auto_min:
            offset: 2
            formula: raw * 0.5
            unit: °C
            mode: auto
            role: min
          auto_max:
            offset: 3
            formula: raw * 0.5
            unit: °C
            mode: auto
            role: max
          heat_min:
            offset: 4
            formula: raw * 0.5
            unit: °C
            mode: heat
            role: min
          heat_max:
            offset: 5
            formula: raw * 0.5
            unit: °C
            mode: heat
            role: max
          half_deg:
            offset: 6
            formula: bit0
            role: flag
            note: 1 = 0.5°C steps supported, 0 = 1°C only. Only present if data_len >= 7.
        alt_names:
          dudanov: CAPABILITY_TEMPERATURES
        note: 'Decoded min/max override the global constraint range per mode. Correction strategy: clamp.'
        confidence: consistent
        sources:
        - dudanov
        - node-mideahvac
      constraints:
        global:
        - valid_range:
          - 16.0
          - 30.5
          step: 0.5
          correction: clamp
          note: 'body[2] encoding limit: bits[3:0] → 16-30°C + bit4 half-degree.'
        - requires: power == on
          correction: reject
          note: Setting temperature when unit is off has no effect.
      xye_note: 'C3 byte[8]: bit7=0 → (val & 0x7F) - 0x40 = °C; bit7=1 → Fahrenheit. Offset 64, 1°C steps.'
      mainboard_note: 'AA20 Grey byte[4]: (val - 30) / 2 °C. Offset 30, 0.5°C steps.'
      disambiguation: 'Three encoding formats exist in 0xC0 response:

        Standard (body[2] bits[3:0]+16), Alternative A (body[1] bits[6:2]+12),

        Alternative B (body[1] bits[5:1]+12). Trigger condition unknown — treat

        alternatives as Hypothesis (possible older protocol versions).

        body[13] bits[4:0] + 12 overrides body[2] when non-zero (extended range 12-43°C).

        '
      confidence: confirmed
      sources:
      - Session 6
      - Session 7
      - Session 11
      - dudanov
      - msmart
