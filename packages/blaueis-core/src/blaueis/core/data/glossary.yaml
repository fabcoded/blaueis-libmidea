      protocols:
        rsp_0xc1_group5:
          frame: 0xC1 Group 5
          byte: body[13]
          decode:
          - offset: 13
            bits:
            - 7
            - 0
          direction: response
          section: §4.2.5
      note: 'S8: 6 raw = 384s = 6.4 min (compressor just started).'
