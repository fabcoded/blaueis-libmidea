      device_context: indoor_unit
      ux:
        visible_in_modes: [cool, heat]
        sources: community protocol research
      mutual_exclusion:
        when_on:
          forces:
            eco_mode: 0
            strong_wind: 0
            turbo_mode: 0
            swing_vertical: 0
            breezeless: 1
          reason: |
