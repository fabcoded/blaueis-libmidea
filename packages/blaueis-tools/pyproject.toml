[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "blaueis-tools"
version = "0.1.0"
description = "Blaueis HVAC tools — AC monitor, probe, diagnostics"
requires-python = ">=3.11"
dependencies = [
    "blaueis-core",
    "blaueis-client",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
