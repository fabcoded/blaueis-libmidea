[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "blaueis-client"
version = "0.1.0"
description = "Blaueis HVAC gateway — WebSocket client library and CLI"
requires-python = ">=3.11"
dependencies = [
    "blaueis-core",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
