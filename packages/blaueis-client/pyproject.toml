[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "blaueis-client"
version = "0.1.0"
description = "Blaueis HVAC gateway — WebSocket client library and CLI"
requires-python = ">=3.11"
dependencies = [
    "blaueis-core",
    "websockets>=12.0",
]

[project.optional-dependencies]
dev = ["pytest>=7.0", "pytest-asyncio>=0.23"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
# ``pytest-homeassistant-custom-component`` is installed in this dev env
# to support ha-midea integration tests. Pytest auto-discovers any
# installed plugin, and phcc's ``pytest_runtest_setup`` hook calls
# ``pytest_socket.disable_socket()`` unconditionally — correct for an
# HA integration test, but blocks our own ``test_device_live.py`` which
# legitimately opens a socket to talk to the gateway. libmidea is not
# an HA test suite, so we drop both plugins at the runner level. They
# stay installed; they're just not active when running libmidea tests.
addopts = "-p no:homeassistant -p no:socket"
